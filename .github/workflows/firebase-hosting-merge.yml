          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RPGTURBO_3F52E }}
          channelId: live
          projectId: rpgturbo-3f52e
